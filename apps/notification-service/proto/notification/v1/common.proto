syntax = "proto3";

package notification.v1;

// ============================================================================
// Enums
// ============================================================================

enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  NOTIFICATION_PRIORITY_LOW = 1;
  NOTIFICATION_PRIORITY_NORMAL = 2;
  NOTIFICATION_PRIORITY_HIGH = 3;
  NOTIFICATION_PRIORITY_URGENT = 4;
}

enum NotificationCategory {
  NOTIFICATION_CATEGORY_UNSPECIFIED = 0;
  NOTIFICATION_CATEGORY_CHAT = 1;          // Chat mentions, messages
  NOTIFICATION_CATEGORY_AGENT = 2;         // Agent run complete, errors
  NOTIFICATION_CATEGORY_SYSTEM = 3;        // Plan changes, maintenance
  NOTIFICATION_CATEGORY_MODERATION = 4;    // Content warnings, bans
  NOTIFICATION_CATEGORY_BILLING = 5;       // Payment, quota alerts
  NOTIFICATION_CATEGORY_SOCIAL = 6;        // Follows, friend requests
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_NAVIGATE = 1;    // Navigate to a page/route
  ACTION_TYPE_POST = 2;        // Trigger a POST request (e.g., accept invite)
  ACTION_TYPE_GET = 3;         // Fetch and display data
  ACTION_TYPE_DISMISS = 4;     // Just dismiss, no action
  ACTION_TYPE_EXTERNAL = 5;    // Open external URL
  ACTION_TYPE_MODAL = 6;       // Open a modal/dialog
  ACTION_TYPE_DOWNLOAD = 7;    // Trigger file download
}

enum OriginService {
  ORIGIN_SERVICE_UNSPECIFIED = 0;
  ORIGIN_SERVICE_API = 1;           // api-service
  ORIGIN_SERVICE_CHAT = 2;          // chat-service
  ORIGIN_SERVICE_RIG = 3;           // rig-service
  ORIGIN_SERVICE_AGENT = 4;         // agent-service
  ORIGIN_SERVICE_NOTIFICATION = 5;  // notification-service (system notifications)
}

enum OriginEntityType {
  ORIGIN_ENTITY_TYPE_UNSPECIFIED = 0;
  ORIGIN_ENTITY_TYPE_CHANNEL = 1;   // Chat channel
  ORIGIN_ENTITY_TYPE_MESSAGE = 2;   // Chat message
  ORIGIN_ENTITY_TYPE_AGENT = 3;     // Agent definition
  ORIGIN_ENTITY_TYPE_RUN = 4;       // Agent run
  ORIGIN_ENTITY_TYPE_WORKFLOW = 5;  // Workflow
  ORIGIN_ENTITY_TYPE_USER = 6;      // User action
}

// ============================================================================
// Core types
// ============================================================================

message Notification {
  string pid = 1;
  string user_id = 2;
  string org_pid = 3;

  // Content
  string title = 4;
  string description = 5;
  optional string icon_url = 6;

  // Classification
  NotificationCategory category = 7;
  NotificationPriority priority = 8;

  // Actions (what happens when user clicks - can have multiple, e.g., "Retry" + "View")
  repeated NotificationAction actions = 9;

  // Origin (which service created this)
  OriginService origin_service = 10;
  optional OriginEntityType origin_entity_type = 11;
  optional string origin_entity_pid = 12;

  // State
  bool is_read = 13;
  optional string read_at = 14;
  bool is_dismissed = 15;
  optional string expires_at = 16;  // Auto-dismiss after this time

  // Timestamps
  string created_at = 17;
  string updated_at = 18;  // Updated on every modification (for ordering)
}

message NotificationAction {
  ActionType kind = 1;
  string target = 2;              // Route path, URL, or endpoint
  map<string, string> params = 3; // Query params or body fields
}

// ============================================================================
// Notification templates (common patterns)
// ============================================================================

message ChatMentionContext {
  string channel_pid = 1;
  string channel_name = 2;
  string message_pid = 3;
  string sender_name = 4;
  string message_preview = 5;
}

message AgentCompleteContext {
  string agent_pid = 1;
  string agent_name = 2;
  string run_pid = 3;
  bool success = 4;
  optional string error_message = 5;
  optional string result_summary = 6;
}

message SystemAlertContext {
  string alert_type = 1;  // "maintenance", "quota", "security"
  map<string, string> details = 2;
}
