syntax = "proto3";

package api.v1;

service OrganizationService {
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse);
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);

  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
  rpc UpdateMember(UpdateMemberRequest) returns (UpdateMemberResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
}

message BrandingSettings {
  optional string logo_url = 1;
  optional string primary_color = 2;
  optional string secondary_color = 3;
  optional string custom_domain = 4;
}

message SecuritySettings {
  optional bool two_factor_required = 1;
  optional int32 session_timeout_minutes = 2;
  optional int32 password_min_length = 3;
  optional bool require_password_symbols = 4;
}

message NotificationSettings {
  optional bool email_on_new_member = 1;
  optional bool email_on_billing_change = 2;
  optional bool slack_notifications = 3;
  optional string slack_webhook_url = 4;
}

message OrganizationSettings {
  optional string timezone = 1;
  optional string locale = 2;
  optional BrandingSettings branding = 3;
  optional SecuritySettings security = 4;
  optional NotificationSettings notifications = 5;
}

message Organization {
  string pid = 1;
  string name = 2;
  string slug = 3;
  OrganizationSettings settings = 4;
  string created_at = 5;
  string updated_at = 6;
  uint64 member_count = 7;
}

message OrganizationMember {
  string pid = 1;
  string organization_id = 2;
  string user_id = 3;
  string role = 4;
  string created_at = 5;
  optional string display_name = 6;
  string email = 7;
}

message ListOrganizationsRequest {}

message ListOrganizationsResponse {
  repeated Organization organizations = 1;
}

message CreateOrganizationRequest {
  string name = 1;
  string slug = 2;
  optional OrganizationSettings settings = 3;
}

message CreateOrganizationResponse {
  Organization organization = 1;
}

message GetOrganizationRequest {
  string organization_pid = 1;
}

message ResourcePermission {
  bool read = 1;
  bool write = 2;
  bool execute = 3;
}

message GetOrganizationResponse {
  Organization organization = 1;
  string user_role = 2; // The requesting user's role in this organization
  map<string, ResourcePermission> permissions = 3; // Resolved permission matrix (resource type → rwx)
}

message UpdateOrganizationRequest {
  string organization_pid = 1;
  optional string name = 2;
  optional string slug = 3;
  optional OrganizationSettings settings = 4;
}

message UpdateOrganizationResponse {
  Organization organization = 1;
}

message DeleteOrganizationRequest {
  string organization_pid = 1;
}

message DeleteOrganizationResponse {}

message ListMembersRequest {
  string organization_pid = 1;
  int32 page_size = 2;
  optional string cursor = 3;
}

message ListMembersResponse {
  repeated OrganizationMember members = 1;
  optional string next_cursor = 2;
  int32 total = 3;
}

message AddMemberRequest {
  string organization_pid = 1;
  string user_id = 2;
  string role = 3;
  optional string email = 4;
}

message AddMemberResponse {
  OrganizationMember member = 1;
}

message UpdateMemberRequest {
  string organization_pid = 1;
  string user_id = 2;
  optional string role = 3;
}

message UpdateMemberResponse {
  OrganizationMember member = 1;
}

message RemoveMemberRequest {
  string organization_pid = 1;
  string user_id = 2;
}

message RemoveMemberResponse {}
