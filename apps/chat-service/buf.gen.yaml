version: v2
plugins:
  - remote: buf.build/bufbuild/es:v2.10.1
    out: ../../packages/proto-ts/src/chat-service
    opt:
      - target=ts

  - remote: buf.build/community/neoeinstein-prost:v0.5.0
    out: ../../packages/proto-rs/src
    opt:
      - compile_well_known_types
      - bytes=.
      - extern_path=.google.protobuf=::pbjson_types
      - type_attribute=.api.v1.UserSettings=#[derive(sea_orm::FromJsonQueryResult)]
      - type_attribute=.api.v1.OrganizationSettings=#[derive(sea_orm::FromJsonQueryResult)]

  - remote: buf.build/community/neoeinstein-prost-serde:v0.4.0
    out: ../../packages/proto-rs/src

  - remote: buf.build/community/neoeinstein-tonic:v0.5.0
    out: ../../packages/proto-rs/src
    opt:
      - compile_well_known_types

  - remote: buf.build/community/neoeinstein-prost-crate:v0.5.0
    out: ../../packages/proto-rs/src
    opt:
      - no_features
      # - include_file=lib.rs
