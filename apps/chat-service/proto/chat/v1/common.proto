syntax = "proto3";

package chat.v1;

// ============================================================================
// Enums
// ============================================================================

enum ChannelType {
  CHANNEL_TYPE_UNSPECIFIED = 0;
  CHANNEL_TYPE_GLOBAL = 1; // Open to all authenticated users
  CHANNEL_TYPE_ORGANIZATION = 2; // Tied to an organization
  CHANNEL_TYPE_PRIVATE = 3; // DM or group DM
  CHANNEL_TYPE_SYSTEM = 4; // System notifications
}

enum ChannelRole {
  CHANNEL_ROLE_UNSPECIFIED = 0;
  CHANNEL_ROLE_MEMBER = 1;
  CHANNEL_ROLE_MODERATOR = 2;
  CHANNEL_ROLE_ADMIN = 3;
  CHANNEL_ROLE_OWNER = 4;
}

enum PresenceStatus {
  PRESENCE_STATUS_UNSPECIFIED = 0;
  PRESENCE_STATUS_ONLINE = 1;
  PRESENCE_STATUS_AWAY = 2;
  PRESENCE_STATUS_DND = 3; // Do not disturb
  PRESENCE_STATUS_OFFLINE = 4;
}

enum MentionType {
  MENTION_TYPE_UNSPECIFIED = 0;
  MENTION_TYPE_USER = 1;
  MENTION_TYPE_CHANNEL = 2;
  MENTION_TYPE_ROLE = 3;
  MENTION_TYPE_EVERYONE = 4;
  MENTION_TYPE_HERE = 5;
}

enum SystemNotificationType {
  SYSTEM_NOTIFICATION_TYPE_UNSPECIFIED = 0;
  SYSTEM_NOTIFICATION_TYPE_INFO = 1;
  SYSTEM_NOTIFICATION_TYPE_WARNING = 2;
  SYSTEM_NOTIFICATION_TYPE_ERROR = 3;
  SYSTEM_NOTIFICATION_TYPE_MAINTENANCE = 4;
}

enum ReportReason {
  REPORT_REASON_UNSPECIFIED = 0;
  REPORT_REASON_SPAM = 1;
  REPORT_REASON_HARASSMENT = 2;
  REPORT_REASON_HATE_SPEECH = 3;
  REPORT_REASON_VIOLENCE = 4;
  REPORT_REASON_NSFW = 5;
  REPORT_REASON_MISINFORMATION = 6;
  REPORT_REASON_OTHER = 7;
}

// ============================================================================
// Channel types
// ============================================================================

message Channel {
  string pid = 1;
  string name = 2;
  ChannelType channel_type = 3;
  optional string description = 4;
  optional string organization_pid = 5;
  optional string icon_url = 6;
  string created_at = 7;
  string updated_at = 8;
}

message ChannelSummary {
  string channel_pid = 1;
  string name = 2;
  ChannelType channel_type = 3;
  bool has_unread = 4;
  int32 unread_count = 5;
  optional ChatMessage last_message = 6;
  optional string last_read_at = 7;
}

message ChannelMember {
  string user_id = 1;
  string user_name = 2;
  optional string avatar_url = 3;
  ChannelRole role = 4;
  string joined_at = 5;
}

// ============================================================================
// Message types
// ============================================================================

message ChatMessage {
  string pid = 1;
  string channel_pid = 2;
  oneof sender {
    UserSender user = 3;
    AgentSender agent = 4;
  }
  string sender_name = 5;
  string content = 6;
  optional string parent_pid = 7; // Thread parent
  string timestamp = 8;
  bool is_deleted = 9;
  bool is_edited = 10;
  optional string edited_at = 11;
  repeated Reaction reactions = 12;
  repeated Attachment attachments = 13;
  repeated Mention mentions = 14;
  optional int32 reply_count = 15; // Thread reply count
  bool is_pinned = 16;
}

message UserSender {
  string user_id = 1;
  optional string avatar_url = 2;
}

message AgentSender {
  string agent_pid = 1;
  string agent_slug = 2;
  optional string avatar_url = 3;
}

message Reaction {
  string emoji = 1;
  int32 count = 2;
  repeated string user_ids = 3; // Who reacted (for UI)
  bool includes_me = 4;
}

message Attachment {
  string pid = 1;
  string filename = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  string url = 5;
  optional string thumbnail_url = 6;
}

message Mention {
  MentionType mention_type = 1;
  string target_id = 2; // user_id, channel_pid, or role name
  string display_text = 3; // @username, #channel, @role
}

message SystemNotification {
  SystemNotificationType kind = 1;
  string content = 2;
  map<string, string> metadata = 3;
}
