syntax = "proto3";

package chat.v1;

import "chat/v1/common.proto";

service ChatService {
  // ============================================================================
  // Real-time connection (single bidirectional stream per client)
  // ============================================================================

  rpc Open(stream ClientEvent) returns (stream ServerEvent);

  // ============================================================================
  // Messages
  // ============================================================================

  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc GetMessageHistory(GetMessageHistoryRequest) returns (GetMessageHistoryResponse);
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);

  // ============================================================================
  // Reactions
  // ============================================================================

  rpc ReactToMessage(ReactToMessageRequest) returns (ReactToMessageResponse);
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse);

  // ============================================================================
  // Pins
  // ============================================================================

  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse);
  rpc UnpinMessage(UnpinMessageRequest) returns (UnpinMessageResponse);
  rpc GetPinnedMessages(GetPinnedMessagesRequest) returns (GetPinnedMessagesResponse);

  // ============================================================================
  // Threads
  // ============================================================================

  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);

  // ============================================================================
  // Search
  // ============================================================================

  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);
}

// ============================================================================
// Stream (bidirectional real-time connection)
// ============================================================================

message ClientEvent {
  oneof event {
    SubscribeChannel subscribe = 1;
    UnsubscribeChannel unsubscribe = 2;
    TypingIndicator typing = 3;
    PresenceUpdate presence = 4;
  }
}

message SubscribeChannel {
  string channel_pid = 1;
}

message UnsubscribeChannel {
  string channel_pid = 1;
}

message TypingIndicator {
  string channel_pid = 1;
  bool is_typing = 2;
}

message PresenceUpdate {
  PresenceStatus status = 1;
  optional string status_text = 2;
}

message ServerEvent {
  string channel_pid = 1;
  oneof event {
    ChatMessage message = 2;
    MessageEdited message_edited = 3;
    MessageDeleted message_deleted = 4;
    ReactionAdded reaction_added = 5;
    ReactionRemoved reaction_removed = 6;
    UserTyping user_typing = 7;
    UserPresence user_presence = 8;
    UserJoinedChannel user_joined = 9;
    UserLeftChannel user_left = 10;
    ChannelUpdated channel_updated = 11;
    SystemNotification notification = 12;
    MessagePinned message_pinned = 13;
    MessageUnpinned message_unpinned = 14;
    AgentStreaming agent_streaming = 15;
  }
}

message MessageEdited {
  string message_pid = 1;
  string new_content = 2;
  string edited_at = 3;
}

message MessageDeleted {
  string message_pid = 1;
}

message ReactionAdded {
  string message_pid = 1;
  string user_id = 2;
  string emoji = 3;
}

message ReactionRemoved {
  string message_pid = 1;
  string user_id = 2;
  string emoji = 3;
}

message UserTyping {
  string user_id = 1;
  string user_name = 2;
  bool is_typing = 3;
}

message UserPresence {
  string user_id = 1;
  PresenceStatus status = 2;
  optional string status_text = 3;
}

message UserJoinedChannel {
  string user_id = 1;
  string user_name = 2;
}

message UserLeftChannel {
  string user_id = 1;
}

message ChannelUpdated {
  Channel channel = 1;
}

message MessagePinned {
  string message_pid = 1;
  string pinned_by_user_id = 2;
}

message MessageUnpinned {
  string message_pid = 1;
}

// Agent streaming (for AI responses)
message AgentStreaming {
  string agent_slug = 1;
  string content = 2;
  bool done = 3;
  string message_pid = 4;
}

// ============================================================================
// Message operations
// ============================================================================

message SendMessageRequest {
  string channel_pid = 1;
  string content = 2;
  optional string parent_pid = 3;
  repeated string attachment_pids = 4; // Pre-uploaded attachments
}

message SendMessageResponse {
  string message_pid = 1;
  string timestamp = 2;
}

message GetMessageHistoryRequest {
  string channel_pid = 1;
  int32 limit = 2;
  optional string before_timestamp = 3;
  optional string after_timestamp = 4;
  optional string around_message_pid = 5; // For jumping to a message
}

message GetMessageHistoryResponse {
  repeated ChatMessage messages = 1;
  bool has_more_before = 2;
  bool has_more_after = 3;
}

message GetMessageRequest {
  string message_pid = 1;
}

message GetMessageResponse {
  ChatMessage message = 1;
}

message EditMessageRequest {
  string message_pid = 1;
  string new_content = 2;
}

message EditMessageResponse {
  ChatMessage message = 1;
}

message DeleteMessageRequest {
  string message_pid = 1;
}

message DeleteMessageResponse {}

// ============================================================================
// Reactions
// ============================================================================

message ReactToMessageRequest {
  string message_pid = 1;
  string emoji = 2;
}

message ReactToMessageResponse {}

message RemoveReactionRequest {
  string message_pid = 1;
  string emoji = 2;
}

message RemoveReactionResponse {}

// ============================================================================
// Pins
// ============================================================================

message PinMessageRequest {
  string message_pid = 1;
}

message PinMessageResponse {}

message UnpinMessageRequest {
  string message_pid = 1;
}

message UnpinMessageResponse {}

message GetPinnedMessagesRequest {
  string channel_pid = 1;
}

message GetPinnedMessagesResponse {
  repeated ChatMessage messages = 1;
}

// ============================================================================
// Threads
// ============================================================================

message GetThreadRequest {
  string parent_message_pid = 1;
  optional int32 limit = 2;
  optional string before_timestamp = 3;
}

message GetThreadResponse {
  ChatMessage parent = 1;
  repeated ChatMessage replies = 2;
  bool has_more = 3;
}

// ============================================================================
// Search
// ============================================================================

message SearchMessagesRequest {
  optional string channel_pid = 1; // If absent, search all accessible
  string query = 2;
  optional string from_user_id = 3;
  optional string after_timestamp = 4;
  optional string before_timestamp = 5;
  optional bool has_attachments = 6;
  optional bool is_pinned = 7;
  int32 limit = 8;
  optional string cursor = 9;
}

message SearchMessagesResponse {
  repeated ChatMessage messages = 1;
  int32 total_count = 2;
  optional string next_cursor = 3;
}
