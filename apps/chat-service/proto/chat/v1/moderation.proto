syntax = "proto3";

package chat.v1;

import "chat/v1/common.proto";

service ModerationService {
  // ============================================================================
  // Reports
  // ============================================================================

  rpc ReportMessage(ReportMessageRequest) returns (ReportMessageResponse);
  rpc ReportUser(ReportUserRequest) returns (ReportUserResponse);
  rpc GetReports(GetReportsRequest) returns (GetReportsResponse);
  rpc ResolveReport(ResolveReportRequest) returns (ResolveReportResponse);

  // ============================================================================
  // User restrictions (channel-level)
  // ============================================================================

  rpc MuteUser(MuteUserRequest) returns (MuteUserResponse);
  rpc UnmuteUser(UnmuteUserRequest) returns (UnmuteUserResponse);
  rpc BanUser(BanUserRequest) returns (BanUserResponse);
  rpc UnbanUser(UnbanUserRequest) returns (UnbanUserResponse);
  rpc GetBannedUsers(GetBannedUsersRequest) returns (GetBannedUsersResponse);
  rpc GetMutedUsers(GetMutedUsersRequest) returns (GetMutedUsersResponse);

  // ============================================================================
  // Moderation log
  // ============================================================================

  rpc GetModerationLog(GetModerationLogRequest) returns (GetModerationLogResponse);

  // ============================================================================
  // Auto-moderation (future)
  // ============================================================================

  rpc GetAutoModSettings(GetAutoModSettingsRequest) returns (GetAutoModSettingsResponse);
  rpc UpdateAutoModSettings(UpdateAutoModSettingsRequest) returns (UpdateAutoModSettingsResponse);
}

// ============================================================================
// Reports
// ============================================================================

message ReportMessageRequest {
  string message_pid = 1;
  ReportReason reason = 2;
  optional string details = 3;
}

message ReportMessageResponse {
  string report_pid = 1;
}

message ReportUserRequest {
  string user_id = 1;
  string channel_pid = 2;
  ReportReason reason = 3;
  optional string details = 4;
  repeated string evidence_message_pids = 5; // Message PIDs as evidence
}

message ReportUserResponse {
  string report_pid = 1;
}

message GetReportsRequest {
  optional string channel_pid = 1; // Filter by channel
  optional ReportStatus status = 2;
  optional ReportReason reason = 3;
  optional int32 limit = 4;
  optional string cursor = 5;
}

enum ReportStatus {
  REPORT_STATUS_UNSPECIFIED = 0;
  REPORT_STATUS_PENDING = 1;
  REPORT_STATUS_REVIEWING = 2;
  REPORT_STATUS_RESOLVED = 3;
  REPORT_STATUS_DISMISSED = 4;
}

message GetReportsResponse {
  repeated Report reports = 1;
  optional string next_cursor = 2;
  int32 total_pending = 3;
}

message Report {
  string pid = 1;
  ReportType report_type = 2;
  string reporter_id = 3;
  string reporter_name = 4;
  optional string target_message_pid = 5;
  optional string target_user_id = 6;
  string channel_pid = 7;
  ReportReason reason = 8;
  optional string details = 9;
  ReportStatus status = 10;
  string created_at = 11;
  optional string resolved_at = 12;
  optional string resolved_by_id = 13;
  optional string resolution_notes = 14;
  optional ReportResolution resolution = 15;
}

enum ReportType {
  REPORT_TYPE_UNSPECIFIED = 0;
  REPORT_TYPE_MESSAGE = 1;
  REPORT_TYPE_USER = 2;
}

enum ReportResolution {
  REPORT_RESOLUTION_UNSPECIFIED = 0;
  REPORT_RESOLUTION_NO_ACTION = 1;
  REPORT_RESOLUTION_WARNING_ISSUED = 2;
  REPORT_RESOLUTION_CONTENT_REMOVED = 3;
  REPORT_RESOLUTION_USER_MUTED = 4;
  REPORT_RESOLUTION_USER_BANNED = 5;
}

message ResolveReportRequest {
  string report_pid = 1;
  ReportResolution resolution = 2;
  optional string notes = 3;
  optional ModerationAction action = 4; // Optional action to take
}

message ModerationAction {
  oneof action {
    DeleteMessageAction delete_message = 1;
    MuteUserAction mute_user = 2;
    BanUserAction ban_user = 3;
    WarnUserAction warn_user = 4;
  }
}

message DeleteMessageAction {
  string message_pid = 1;
}

message MuteUserAction {
  string user_id = 1;
  optional int64 duration_seconds = 2;
}

message BanUserAction {
  string user_id = 1;
  optional bool delete_messages = 2;
}

message WarnUserAction {
  string user_id = 1;
  string warning_message = 2;
}

message ResolveReportResponse {
  Report report = 1;
}

// ============================================================================
// User restrictions
// ============================================================================

message MuteUserRequest {
  string channel_pid = 1;
  string user_id = 2;
  optional int64 duration_seconds = 3; // If absent, permanent until unmuted
  optional string reason = 4;
}

message MuteUserResponse {
  string muted_until = 1; // empty if permanent
}

message UnmuteUserRequest {
  string channel_pid = 1;
  string user_id = 2;
}

message UnmuteUserResponse {}

message BanUserRequest {
  string channel_pid = 1;
  string user_id = 2;
  optional string reason = 3;
  optional bool delete_messages = 4; // Delete user's messages in channel
  optional int64 delete_messages_seconds = 5; // How far back to delete (default: all)
}

message BanUserResponse {}

message UnbanUserRequest {
  string channel_pid = 1;
  string user_id = 2;
}

message UnbanUserResponse {}

message GetBannedUsersRequest {
  string channel_pid = 1;
  optional int32 limit = 2;
  optional string cursor = 3;
}

message GetBannedUsersResponse {
  repeated BannedUser users = 1;
  optional string next_cursor = 2;
}

message BannedUser {
  string user_id = 1;
  string user_name = 2;
  optional string avatar_url = 3;
  string banned_by_id = 4;
  optional string reason = 5;
  string banned_at = 6;
}

message GetMutedUsersRequest {
  string channel_pid = 1;
  optional int32 limit = 2;
  optional string cursor = 3;
}

message GetMutedUsersResponse {
  repeated MutedUser users = 1;
  optional string next_cursor = 2;
}

message MutedUser {
  string user_id = 1;
  string user_name = 2;
  optional string avatar_url = 3;
  string muted_by_id = 4;
  optional string reason = 5;
  string muted_at = 6;
  string muted_until = 7; // empty if permanent
}

// ============================================================================
// Moderation log
// ============================================================================

message GetModerationLogRequest {
  string channel_pid = 1;
  optional string moderator_id = 2; // Filter by who took action
  optional string target_user_id = 3; // Filter by who was affected
  optional ModerationActionType action_type = 4;
  optional int32 limit = 5;
  optional string cursor = 6;
}

enum ModerationActionType {
  MODERATION_ACTION_TYPE_UNSPECIFIED = 0;
  MODERATION_ACTION_TYPE_MUTE = 1;
  MODERATION_ACTION_TYPE_UNMUTE = 2;
  MODERATION_ACTION_TYPE_BAN = 3;
  MODERATION_ACTION_TYPE_UNBAN = 4;
  MODERATION_ACTION_TYPE_KICK = 5;
  MODERATION_ACTION_TYPE_WARN = 6;
  MODERATION_ACTION_TYPE_DELETE_MESSAGE = 7;
  MODERATION_ACTION_TYPE_ROLE_CHANGE = 8;
}

message GetModerationLogResponse {
  repeated ModerationLogEntry entries = 1;
  optional string next_cursor = 2;
}

message ModerationLogEntry {
  string pid = 1;
  string channel_pid = 2;
  string moderator_id = 3;
  string moderator_name = 4;
  string target_user_id = 5;
  string target_user_name = 6;
  ModerationActionType action_type = 7;
  optional string reason = 8;
  map<string, string> metadata = 9; // Additional context (e.g., duration, message_pid)
  string created_at = 10;
}

// ============================================================================
// Auto-moderation
// ============================================================================

message GetAutoModSettingsRequest {
  string channel_pid = 1;
}

message GetAutoModSettingsResponse {
  AutoModSettings settings = 1;
}

message UpdateAutoModSettingsRequest {
  string channel_pid = 1;
  AutoModSettings settings = 2;
}

message UpdateAutoModSettingsResponse {
  AutoModSettings settings = 1;
}

message AutoModSettings {
  bool enabled = 1;

  // Spam detection
  bool spam_filter_enabled = 2;
  int32 max_messages_per_minute = 3;
  int32 max_duplicate_messages = 4;

  // Content filtering
  bool profanity_filter_enabled = 5;
  ProfanityFilterLevel profanity_filter_level = 6;
  repeated string custom_blocked_words = 7;
  repeated string custom_allowed_words = 8;

  // Link filtering
  bool link_filter_enabled = 9;
  repeated string allowed_domains = 10;
  bool block_all_links = 11;

  // Mention limits
  int32 max_mentions_per_message = 12;
  bool block_everyone_mentions = 13;
  bool block_role_mentions = 14;

  // Actions
  AutoModAction default_action = 15;
}

enum ProfanityFilterLevel {
  PROFANITY_FILTER_LEVEL_UNSPECIFIED = 0;
  PROFANITY_FILTER_LEVEL_LOW = 1; // Only severe profanity
  PROFANITY_FILTER_LEVEL_MEDIUM = 2; // Common profanity
  PROFANITY_FILTER_LEVEL_HIGH = 3; // Aggressive filtering
}

enum AutoModAction {
  AUTO_MOD_ACTION_UNSPECIFIED = 0;
  AUTO_MOD_ACTION_FLAG = 1; // Flag for review
  AUTO_MOD_ACTION_DELETE = 2; // Delete message
  AUTO_MOD_ACTION_MUTE = 3; // Mute user temporarily
  AUTO_MOD_ACTION_WARN = 4; // Send warning to user
}
