syntax = "proto3";

package rig.v1;

import "google/protobuf/struct.proto";

service ProviderService {
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc GetProvider(GetProviderRequest) returns (GetProviderResponse);
  rpc CreateProvider(CreateProviderRequest) returns (CreateProviderResponse);
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse);
  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse);
}

service ModelService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc GetModel(GetModelRequest) returns (GetModelResponse);
  rpc RefreshProviderModels(RefreshProviderModelsRequest) returns (RefreshProviderModelsResponse);
}

enum ProviderSource {
  PROVIDER_SOURCE_UNSPECIFIED = 0;
  PROVIDER_SOURCE_SYSTEM = 1;
  PROVIDER_SOURCE_USER = 2;
}

message Provider {
  oneof identifier {
    int32 id = 1;
    string pid = 2;
  }
  string name = 3;
  string provider_type = 4;
  ProviderSource source = 5;
  optional string user_id = 6;
  google.protobuf.Struct config = 7;
  string credentials = 8;
  string endpoint_url = 9;
  bool is_active = 10;
  string created_at = 11;
  string updated_at = 12;
}

message ListProvidersRequest {
  optional bool is_active = 1;
  optional ProviderSource source = 2;
  optional string provider_type = 3;
  int32 page = 5;
  int32 page_size = 6;
}

message ListProvidersResponse {
  repeated Provider providers = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetProviderRequest {
  string pid = 1;
}

message GetProviderResponse {
  Provider provider = 1;
}

message CreateProviderRequest {
  string name = 1;
  string provider_type = 2;
  ProviderSource source = 3;
  google.protobuf.Struct config = 4;
  string credentials = 5;
  string endpoint_url = 6;
}

message CreateProviderResponse {
  Provider provider = 1;
}

message UpdateProviderRequest {
  string pid = 1;
  optional string name = 2;
  optional string provider_type = 3;
  optional google.protobuf.Struct config = 4;
  optional string credentials = 5;
  optional string endpoint_url = 6;
  optional bool is_active = 7;
}

message UpdateProviderResponse {
  Provider provider = 1;
}

message DeleteProviderRequest {
  string pid = 1;
}

message DeleteProviderResponse {}

// =============================================================================
// Model messages
// =============================================================================

// Capabilities that a model may support
message ModelCapabilities {
  bool vision = 1;              // Can process images
  bool function_calling = 2;    // Supports tool/function calls
  bool json_mode = 3;           // Can output structured JSON
  bool streaming = 4;           // Supports streaming responses
  bool system_prompt = 5;       // Supports system/preamble messages
  bool multi_turn = 6;          // Supports multi-turn conversations
  bool thinking = 7;            // Supports extended thinking/reasoning
}

// Provider-specific metadata
message ModelMetadata {
  optional string owned_by = 1;         // OpenAI: organization that owns the model
  optional string family = 2;           // Model family (e.g., "gpt-4", "claude-3")
  optional int64 input_cost_per_mtok = 3;   // Cost per million input tokens (microdollars)
  optional int64 output_cost_per_mtok = 4;  // Cost per million output tokens (microdollars)
  optional int64 max_output_tokens = 5;     // Maximum tokens model can generate
  optional string quantization = 6;     // Ollama: quantization level (e.g., "Q4_0")
  optional int64 size_bytes = 7;        // Ollama: model size on disk
}

message Model {
  oneof identifier {
    int32 id = 1;
    string pid = 2;
  }

  string model_id = 3;              // Provider's model identifier (e.g., "gpt-4o", "claude-3-opus-20240229")
  string name = 4;                  // Display name

  string provider_pid = 5;          // FK to Provider
  string provider_type = 6;         // Denormalized: "openai", "anthropic", etc.
  string provider_name = 7;         // Denormalized: Provider's display name

  optional int32 context_length = 8;
  ModelCapabilities capabilities = 9;
  ModelMetadata metadata = 10;

  bool is_active = 11;
  optional string deprecation_message = 12;  // If present, model is deprecated

  optional string last_fetched_at = 13;
  string created_at = 14;
  string updated_at = 15;
}

message ListModelsRequest {
  optional string provider_pid = 1;       // Filter by provider
  optional string provider_type = 2;      // Filter by provider type (e.g., "openai")
  optional bool is_active = 3;            // Filter by active status
  optional bool include_deprecated = 4;   // Include deprecated models (default: false)
  int32 page = 5;
  int32 page_size = 6;
}

message ListModelsResponse {
  repeated Model models = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetModelRequest {
  string pid = 1;
}

message GetModelResponse {
  Model model = 1;
}

message RefreshProviderModelsRequest {
  optional string provider_pid = 1;  // If set, refresh only this provider; if empty, refresh all accessible providers
}

message RefreshProviderModelsResponse {
  int32 providers_queued = 1;        // Number of providers queued for refresh
  repeated string provider_pids = 2; // PIDs of providers being refreshed
}
