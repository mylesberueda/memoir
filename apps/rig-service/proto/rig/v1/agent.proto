syntax = "proto3";

package rig.v1;

import "rig/v1/tool.proto";

service AgentService {
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
  rpc UpdateAgent(UpdateAgentRequest) returns (UpdateAgentResponse);
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse);
  rpc GetUserAssistant(GetUserAssistantRequest) returns (GetUserAssistantResponse);
  rpc ShareAgent(ShareAgentRequest) returns (ShareAgentResponse);
  rpc UnshareAgent(UnshareAgentRequest) returns (UnshareAgentResponse);
  rpc ListAgentShares(ListAgentSharesRequest) returns (ListAgentSharesResponse);
}

enum AgentKind {
  AGENT_KIND_UNSPECIFIED = 0;
  AGENT_KIND_STARTUP = 1;
  AGENT_KIND_EPHEMERAL = 2;
}

// Shared config fields applicable to all agent types.
message BaseAgentConfig {
  optional uint32 history_length = 1;
  optional bool thinking_enabled = 2;
  optional bool streaming_enabled = 3;
  optional uint32 timeout_seconds = 4;
  optional uint32 session_ttl_seconds = 5;
  optional uint32 max_tokens = 6;

  // Memory/embedding config
  optional bool memory_enabled = 7;
  optional uint32 memory_result_count = 8;
  optional float memory_similarity_threshold = 9;

  optional float compaction_threshold = 10;
  optional float compaction_keep_ratio = 11;

  // Document context config
  optional uint32 document_result_count = 12;

  // Idle timeout: resets on every stream item (text, tool call, tool result).
  // Fires only when the stream produces no activity for this duration.
  // Distinct from timeout_seconds (field 4), which is a wall-clock cap.
  optional uint32 idle_timeout_seconds = 13;
}

// Config specific to the Startup agent type.
message StartupAgentConfig {
  optional bool use_system_providers_on_creation = 1;
}

// Top-level agent config: shared base + kind-specific config.
message AgentConfig {
  BaseAgentConfig base = 1;

  oneof kind_config {
    StartupAgentConfig startup = 2;
  }
}

message AgentProvider {
  string pid = 1;
  string name = 2;
}

message AgentModel {
  string pid = 1;
  string model_id = 2;
  AgentProvider provider = 3;
}

message Agent {
  oneof identifier {
    int32 id = 1;
    string pid = 2;
  }
  string name = 3;
  string slug = 4;
  AgentKind kind = 5;
  AgentModel model = 6;
  int32 temperature = 7;
  string system_prompt = 9;
  repeated Tool tools = 10;
  AgentConfig config = 11;
  bool is_active = 13;
  string created_by_user_id = 15;
  string created_at = 16;
  string updated_at = 17;
}

message ListAgentsRequest {
  optional string user_id = 1;
  optional bool is_active = 2;
  optional string provider_pid = 3;
  int32 page = 4;
  int32 page_size = 5;
  // When false, excludes agents that are linked as user assistants
  optional bool with_assistants = 6;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetAgentRequest {
  string pid = 1;
}

message GetAgentResponse {
  Agent agent = 1;
}

message CreateAgentRequest {
  string name = 1;
  string model_pid = 2;
  int32 temperature = 3;
  string system_prompt = 4;
  AgentConfig config = 5;
  optional string provider_pid = 6;
  repeated string tool_pids = 7;
  AgentKind kind = 8;
}

message CreateAgentResponse {
  Agent agent = 1;
}

message UpdateAgentToolRequest {
  string pid = 1;
  bool is_active = 2;
}

message UpdateAgentRequest {
  string pid = 1;
  optional string name = 2;
  optional string slug = 3;
  optional string model_pid = 4;
  optional int32 temperature = 5;
  optional string system_prompt = 6;
  optional AgentConfig config = 7;
  optional string provider_pid = 8;
  repeated UpdateAgentToolRequest tools = 9;
  optional bool is_active = 10;
  optional AgentKind kind = 11;
}

message UpdateAgentResponse {
  Agent agent = 1;
}

message DeleteAgentRequest {
  string pid = 1;
}

message DeleteAgentResponse {}

message GetUserAssistantRequest {
  string user_id = 1;
}

message GetUserAssistantResponse {
  Agent agent = 1;
}

// --- Sharing ---

message AgentShare {
  string user_id = 1;
  int32 permissions = 2; // bitfield: 1=read, 2=write, 4=execute
  string shared_by = 3;
  string created_at = 4;
  optional string display_name = 5;
  string email = 6;
}

message ShareAgentRequest {
  string agent_pid = 1;
  string user_id = 2; // recipient
  int32 permissions = 3; // bitfield
}

message ShareAgentResponse {}

message UnshareAgentRequest {
  string agent_pid = 1;
  string user_id = 2; // recipient to revoke
}

message UnshareAgentResponse {}

message ListAgentSharesRequest {
  string agent_pid = 1;
  int32 page_size = 2;
  optional string cursor = 3;
}

message ListAgentSharesResponse {
  repeated AgentShare shares = 1;
  optional string next_cursor = 2;
  int32 total = 3;
}
