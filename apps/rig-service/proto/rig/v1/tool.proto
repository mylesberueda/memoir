syntax = "proto3";

package rig.v1;

service ToolService {
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc GetTool(GetToolRequest) returns (GetToolResponse);
}

message Tool {
  string pid = 1;
  string name = 2;
  string description = 3;
  // "system" for built-in tools, "user_defined" for user-created tools
  string tool_type = 4;
  bool is_active = 5;
}

message ListToolsRequest {
  optional bool is_active = 1;
  optional string tool_type = 2;
  uint64 page = 3;
  uint64 page_size = 4;
}

message ListToolsResponse {
  repeated Tool tools = 1;
  uint64 total = 2;
  uint64 page = 3;
  uint64 page_size = 4;
}

message GetToolRequest {
  string pid = 1;
}

message GetToolResponse {
  Tool tool = 1;
}
