syntax = "proto3";

package memoir.v1;

import "google/protobuf/timestamp.proto";

// AdminService exposes operator-only triage of the write-behind queue.
//
// ⚠ Admin-only. Every RPC on this service is gated server-side on
// `caller.is_admin == true` from the existing AuthService middleware
// (see `apps/memoir-service/src/middleware/auth.rs`). Non-admin callers
// receive `PermissionDenied`. The proto carries no permission annotation;
// the handler is the enforcement point — do not wire AdminService under a
// handler that skips the admin check.
//
// Surface mirrors the library admin methods in
// `packages/memoir-core/src/client/mod.rs:443-505` and
// `packages/memoir-core/src/client/admin.rs`. memoir-service is a thin
// adapter; new admin functionality lands in memoir-core first.
//
// Excluded by design (operator PII boundary):
//   - The original job payload and any content from the referenced memory
//     are NEVER included in admin responses. Operators inspecting failures
//     follow up via `MemoryService.Recall` against the source pid when they
//     need the underlying memory's content.
service AdminService {
  // ── Queue inspection ─────────────────────────────────────────────────────

  // List failed jobs newest-first, capped at `limit`. Metadata only — no
  // payload, no memory content. Pagination is limit-only in v0.1.
  rpc ListFailedJobs(ListFailedJobsRequest) returns (ListFailedJobsResponse);

  // Return the number of jobs currently in `pending` state. Cheap counter
  // for queue-depth dashboards.
  rpc PendingJobsCount(PendingJobsCountRequest) returns (PendingJobsCountResponse);

  // ── Per-job triage ───────────────────────────────────────────────────────

  // Retry one failed job by id, clearing the attempt counter (operator
  // intent overrides prior failure budget).
  rpc RetryJob(RetryJobRequest) returns (RetryJobResponse);

  // Permanently delete one failed job by id. The referenced memory row is
  // untouched. Destructive — once a failed job is deleted, the memory's
  // processing state is unrecoverable except by re-running `Remember`.
  rpc DeleteFailedJob(DeleteFailedJobRequest) returns (DeleteFailedJobResponse);

  // ── Bulk operations ──────────────────────────────────────────────────────

  // Bulk retry every failed job, optionally filtered by kind. Set
  // `dry_run = true` to preview the affected count without modifying any
  // rows — a wide retry against many failed extract jobs can DoS the
  // configured LLM provider.
  rpc RetryFailedJobs(RetryFailedJobsRequest) returns (RetryFailedJobsResponse);

  // ── Memory lifecycle ─────────────────────────────────────────────────────

  // Clear the supersession marker on a memory, restoring it to active
  // state. Operator-only counterpart to the internal supersede path
  // performed by the contradiction-detection pass. Document for operators:
  // do not call in normal flow.
  rpc Unsupersede(UnsupersedeRequest) returns (UnsupersedeResponse);

  // ── Maintenance ──────────────────────────────────────────────────────────

  // Run the reconciliation passes: retry failed rows + clean orphan vectors
  // out of the index. Heavyweight — may take many seconds on large stores.
  // Unary, not streaming. memoir-ui should not poll this RPC; it's a
  // human-initiated maintenance action.
  rpc Reconcile(ReconcileRequest) returns (ReconcileResponse);

  // ── Quality metrics ──────────────────────────────────────────────────────

  // Extraction accuracy per (provider, model) over a scope slice — the
  // read-only aggregate that proves extraction quality to a consumer
  // (`accuracy = 1 − rejected/total`, rejected = corrected wrong extractions
  // only). No LLM call. Scope fields on the request narrow the slice and are
  // AND-combined; all-unset aggregates the whole store. Wraps memoir-core's
  // `Client::extraction_stats`.
  rpc ExtractionStats(ExtractionStatsRequest) returns (ExtractionStatsResponse);

  // ── Knowledge graph ──────────────────────────────────────────────────────

  // Read a whole-scope snapshot of the knowledge graph — the admin "Knowledge
  // graph view": every entity and relationship (current AND superseded) in a
  // scope, for memoir-ui to render. Read-only graph traversal, no LLM call.
  //
  // Scope fields narrow the view and are AND-combined; an unset field widens
  // ACROSS that dimension — all-unset inspects every tenant. This is the one
  // cross-scope read in memoir, and it is admin-only by design: the write,
  // forget, and search-enrichment paths keep full-scope-tuple isolation. Wraps
  // memoir-core's `Client::inspect_graph`. Returns an empty snapshot when the
  // service has no graph configured.
  rpc InspectGraph(InspectGraphRequest) returns (InspectGraphResponse);
}

// ─── Core types ─────────────────────────────────────────────────────────────

// JobKind mirrors `memoir_core::jobs::JobKind`. The set is closed by the
// CHECK constraint on `memory_jobs.kind`; extending it requires a
// follow-up library migration first, then a proto bump.
enum JobKind {
  JOB_KIND_UNSPECIFIED = 0;
  JOB_KIND_EMBED = 1; // Embed a memory's content + upsert its vector.
  JOB_KIND_EXTRACT = 2; // Run LLM extraction against an episodic memory.
  JOB_KIND_CATEGORIZE = 3; // Run NLI categorization against a semantic memory.
  JOB_KIND_REPROCESS = 4; // Re-derive semantic rows from a corrected episodic source.
  JOB_KIND_RELATIONAL_EXTRACT = 5; // Derive relational triples from an episodic memory (knowledge graph).
  JOB_KIND_SYNTHESIZE = 6; // Reconcile triples against semantic facts + commit to the graph.
}

// FailedJob mirrors `memoir_core::jobs::FailedJob` exactly. Deliberately
// excludes the original `payload` and any content from the referenced
// memory — see the service-level PII boundary in AdminService's doc
// comment.
message FailedJob {
  int64 id = 1;
  string source_pid = 2; // The memory pid this job processes.
  JobKind kind = 3;
  int32 attempts = 4;
  optional string failure_reason = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// ─── ListFailedJobs RPC ─────────────────────────────────────────────────────

message ListFailedJobsRequest {
  // Maximum rows to return. `limit = 0` means "use library default" (the
  // implementer maps to whatever cap `Client::failed_jobs` accepts at
  // ticket-time). Pagination is limit-only in v0.1 — no cursor.
  int32 limit = 1;
}

message ListFailedJobsResponse {
  repeated FailedJob jobs = 1;
}

// ─── PendingJobsCount RPC ───────────────────────────────────────────────────

message PendingJobsCountRequest {}

message PendingJobsCountResponse {
  // Number of jobs currently in `pending` state. Library returns `u64`;
  // wire is `int64` for TS-compat (JS `number` is f64, safe to 2^53-1).
  int64 count = 1;
}

// ─── RetryJob RPC ───────────────────────────────────────────────────────────

message RetryJobRequest {
  int64 id = 1;
}

message RetryJobResponse {}

// ─── DeleteFailedJob RPC ────────────────────────────────────────────────────

// No `hard_delete` flag: the library's `Client::delete_failed_job` is
// unconditional. The referenced memory row is untouched either way.
message DeleteFailedJobRequest {
  int64 id = 1;
}

message DeleteFailedJobResponse {}

// ─── RetryFailedJobs (bulk) RPC ─────────────────────────────────────────────

message RetryFailedJobsRequest {
  // When set, only retry jobs of this kind. Unset = retry all kinds.
  optional JobKind of_kind = 1;

  // When true, return the affected count without touching any rows.
  bool dry_run = 2;
}

message RetryFailedJobsResponse {
  // Number of jobs the operation affected (or, in `dry_run` mode, would
  // have affected). Mirrors `RetryBuilder`'s `u64` return.
  int64 affected = 1;

  // Echo of the request's `dry_run` for caller clarity — confirms that the
  // count reflects a preview, not a real retry.
  bool dry_run = 2;
}

// ─── Unsupersede RPC ────────────────────────────────────────────────────────

message UnsupersedeRequest {
  string pid = 1;
}

message UnsupersedeResponse {}

// ─── Reconcile RPC ──────────────────────────────────────────────────────────

message ReconcileRequest {
  // When true, run only the failed-row retry pass; skip orphan cleanup.
  bool only_retry_failed = 1;

  // When true, run only the orphan-cleanup pass; skip retry. Set BOTH
  // flags to false (or omit both) to run both passes.
  bool only_clean_orphans = 2;
}

message ReconcileResponse {
  // Mirrors `memoir_core::client::ReconcileSummary`. Counts reflect work
  // performed, not work attempted — see the library docs.
  int64 failed_retried = 1; // Rows the retry pass attempted to re-embed.
  int64 failed_recovered = 2; // Rows the retry pass moved into `indexed`.
  int64 orphans_deleted = 3; // Orphan vectors deleted from the index.
}

// ─── ExtractionStats RPC ────────────────────────────────────────────────────

message ExtractionStatsRequest {
  // Optional scope-subset filters. Each set field narrows the slice; unset
  // imposes no constraint. All three unset aggregates the whole store. These
  // map to memoir-core's `StatsFilter`, a partial scope (not the all-required
  // `Scope`), so `org_id` alone yields a per-tenant number.
  optional string agent_id = 1;
  optional string org_id = 2;
  optional string user_id = 3;
}

// One (provider, model) accuracy row. Mirrors `memoir_core::memory::ExtractionStat`.
message ExtractionStat {
  string provider = 1; // Producing LLM provider (e.g. "ollama").
  string model = 2; // Producing model id (e.g. "qwen3:14b").
  int64 total = 3; // Semantic rows produced (active + retired, any reason).
  int64 rejected = 4; // Subset retired as a corrected wrong extraction.

  // Derived `1 − rejected/total` in [0, 1], computed library-side so wire
  // consumers need not reproduce the total = 0 → 1.0 identity. Echoed for
  // convenience; `total`/`rejected` remain authoritative.
  double accuracy = 5;
}

message ExtractionStatsResponse {
  // Per-(provider, model) rows, ordered by provider then model. Empty when
  // the slice has no semantic rows.
  repeated ExtractionStat stats = 1;
}

// ─── InspectGraph RPC ───────────────────────────────────────────────────────

message InspectGraphRequest {
  // Optional scope-subset filters. Each set field narrows the view; an unset
  // field widens across that dimension. All three unset inspects every tenant
  // — the cross-scope admin view. Maps to memoir-core's partial-scope
  // `Client::inspect_graph` setters.
  optional string agent_id = 1;
  optional string org_id = 2;
  optional string user_id = 3;

  // Maximum nodes and maximum edges to return (applied independently). `0`
  // means "use library default"; the library clamps to its hard maximum. When
  // a cap is hit, the response's `truncated` flag is set.
  uint32 limit = 4;
}

// One entity node in an admin graph snapshot. Mirrors
// `memoir_core::graph::GraphNode`. Untyped in v1 (the node carries only its
// canonical name for identity) plus the provenance the admin view renders.
message GraphNode {
  string name = 1; // Canonical entity name (identity within a scope).
  repeated string memory_pids = 2; // Memories that contributed this entity.
  optional string first_seen_at = 3; // RFC 3339; absent if the node lacks it.
}

// One relationship edge in an admin graph snapshot. Mirrors
// `memoir_core::graph::GraphEdge`. Carries the full temporal state so the UI can
// render history: `valid_to` is absent for a current edge, set for a superseded
// one.
message GraphEdge {
  string subject = 1;
  string relation = 2;
  string object = 3;
  float confidence = 4; // [0.0, 1.0].
  optional string valid_from = 5; // RFC 3339; when the fact became true.
  optional string valid_to = 6; // RFC 3339; when superseded. Absent = current.
  repeated string memory_pids = 7; // Memories that contributed this edge.
}

message InspectGraphResponse {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
  // Whether the node or edge list was capped at the limit — the view is
  // partial, not the scope small.
  bool truncated = 3;
}
