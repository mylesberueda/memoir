[package]
name = "proto-rs"
version = "0.1.0"
edition = "2021"
publish = false

# This whole package is generated - there's no need to lint
[lints.clippy]
all = "allow"

[lib]
name = "proto_rs"
path = "src/lib.rs"

[dependencies]
pbjson = "0.9.0"
pbjson-types = "0.9.0"
prost = "0.14.1"
prost-types = "0.14.1"
serde_json = { workspace = true }
serde = { workspace = true }
tonic = { workspace = true, features = ["gzip"] }
tonic-prost = "0.14.2"
