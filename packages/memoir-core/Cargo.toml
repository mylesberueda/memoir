[package]
name = "polypixel-memoir-core"
version = "0.1.0"
description = "Memoir memory substrate as an embeddable Rust library"
authors = ["Myles Berueda <myles@polypixel.io>"]
edition = "2024"

[lib]
name = "memoir_core"
path = "src/lib.rs"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
fastembed = { version = "5.13" }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }

[features]
default = []
integration = []
unit = []
