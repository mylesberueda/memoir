[package]
name = "polypixel-memoir-core"
version = "0.1.0"
description = "Memoir memory substrate as an embeddable Rust library"
authors = ["Myles Berueda <myles@polypixel.io>"]
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mylesberueda/memoir"
homepage = "https://github.com/mylesberueda/memoir"
documentation = "https://docs.rs/polypixel-memoir-core"
readme = "README.md"
keywords = ["memory", "ai", "agent", "vector", "embedding"]
categories = ["database", "asynchronous", "api-bindings"]

[lib]
name = "memoir_core"
path = "src/lib.rs"

[[bin]]
name = "memoir_core_migrate"
path = "src/bin/memoir_core_migrate.rs"

[dependencies]
async-trait = "0.1"
bon = { version = "3.9" }
chrono = { version = "0.4", features = ["serde"] }
dotenvy = "0.15"
falkordb = { version = "0.2", optional = true, default-features = false, features = [
  "tokio",
] }
fastembed = { version = "5.13" }
futures = { version = "0.3" }
hf-hub = { version = "0.5" }
nanoid = { version = "0.5" }
once_cell = "1.20"
ort = { version = "=2.0.0-rc.12" }
qdrant-client = { version = "1.18" }
regex = "1.12"
rig-core = { version = "0.37" }
sea-orm = { version = "2.0.0-rc.20", features = [
  "sqlx-postgres",
  "runtime-tokio-rustls",
] }
sea-orm-migration = { version = "2.0.0-rc.20", features = [
  "runtime-tokio-rustls",
  "sqlx-postgres",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
strum = { version = "0.28", features = ["derive"] }
thiserror = { workspace = true }
tokenizers = { version = "0.23" }
tokio = { workspace = true, features = ["rt", "sync", "time", "macros"] }
tokio-util = { version = "0.7" }
tracing = { workspace = true }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
anyhow = { version = "1" }
nanoid = { version = "0.5" }
qdrant-client = { version = "1.18" }
sea-orm = { version = "2.0.0-rc.20", features = [
  "sqlx-postgres",
  "runtime-tokio-rustls",
] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter"] }

[features]
default = []
# Enables CUDA execution for the NLI classifier.
cuda = ["ort/cuda"]
# Enables the FalkorDB-backed knowledge graph.
knowledge-graph = ["dep:falkordb"]
integration = []
unit = []
