[package]
name = "polypixel-memoir-core-migration"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "memoir_core_migration"
path = "src/lib.rs"

[[bin]]
name = "memoir_core_migrate"
path = "src/main.rs"

[dependencies]
dotenvy = "0.15"
once_cell = "1.20"
regex = { version = "1.12" }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[dependencies.sea-orm-migration]
version = "2.0.0-rc.20"
features = [
  "runtime-tokio-rustls",
  "sqlx-postgres",
]
