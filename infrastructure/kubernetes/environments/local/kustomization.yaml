# Kustomization for local Kind cluster
#
# Pre-cleanup this file patched per-service ConfigMaps (api-service, chat-service,
# notification-service, rig-service, web) with K8s-internal URL overrides
# (DATABASE_URL, REDIS_URL, ZITADEL_URL, inter-service URLs).
#
# After epic 0002 deleted those services and removed Zitadel, no service-level
# patches remain. The future memoir-server epic re-introduces a single
# memoir-server ConfigMap patch here, and the future memoir-ui rename
# re-introduces a memoir-ui ConfigMap patch.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

# resources: and patches: are intentionally empty.
# Memoir-server and memoir-ui patches are populated by their respective epics.
resources: []
patches: []
