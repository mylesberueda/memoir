# Kustomization for local Kind cluster
#
# Two-step process:
#   1. pnpm k8s:configmap  - Generates base ConfigMaps from each service's .env
#   2. kubectl apply -k .  - Patches ConfigMaps with K8s URL overrides
#
# Usage:
#   pnpm k8s:configmap
#   kubectl apply -k infrastructure/kubernetes/environments/local/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

# Include the base ConfigMaps generated by pnpm k8s:configmap
resources:
  - configmaps/api-service.yaml
  - configmaps/chat-service.yaml
  - configmaps/notification-service.yaml
  - configmaps/rig-service.yaml
  - configmaps/web.yaml

# Patch ConfigMaps with K8s-specific URL overrides
patches:
  # API Service
  - target:
      kind: ConfigMap
      name: api-service-env
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: api-service-env
      data:
        DATABASE_URL: "postgres://postgres:postgres@startupai-postgres:5432/api_service"
        REDIS_URL: "redis://startupai-redis:6379"
        ZITADEL_URL: "http://startupai-zitadel:8080"
        ZITADEL_JWKS_URL: "http://startupai-zitadel:8080/oauth/v2/keys"
        ZITADEL_ISSUER: "http://startupai-zitadel:8080"
        UI_URL: "http://web:3000"

  # Chat Service
  - target:
      kind: ConfigMap
      name: chat-service-env
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: chat-service-env
      data:
        DATABASE_URL: "postgres://postgres:postgres@startupai-postgres:5432/chat_service"
        REDIS_URL: "redis://startupai-redis:6379"
        ZITADEL_URL: "http://startupai-zitadel:8080"
        ZITADEL_JWKS_URL: "http://startupai-zitadel:8080/oauth/v2/keys"
        ZITADEL_ISSUER: "http://startupai-zitadel:8080"

  # Notification Service
  - target:
      kind: ConfigMap
      name: notification-service-env
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: notification-service-env
      data:
        DATABASE_URL: "postgres://postgres:postgres@startupai-postgres:5432/notification_service"
        ZITADEL_URL: "http://startupai-zitadel:8080"
        ZITADEL_JWKS_URL: "http://startupai-zitadel:8080/oauth/v2/keys"
        ZITADEL_ISSUER: "http://startupai-zitadel:8080"

  # Rig Service
  - target:
      kind: ConfigMap
      name: rig-service-env
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: rig-service-env
      data:
        DATABASE_URL: "postgres://postgres:postgres@startupai-postgres:5432/rig_service"
        REDIS_URL: "redis://startupai-redis:6379"
        ZITADEL_URL: "http://startupai-zitadel:8080"
        ZITADEL_JWKS_URL: "http://startupai-zitadel:8080/oauth/v2/keys"
        ZITADEL_ISSUER: "http://startupai-zitadel:8080"

  # Web
  - target:
      kind: ConfigMap
      name: web-env
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: web-env
      data:
        REDIS_URL: "redis://startupai-redis:6379"
        ZITADEL_URL: "http://startupai-zitadel:8080"
        ZITADEL_JWKS_URL: "http://startupai-zitadel:8080/oauth/v2/keys"
        ZITADEL_ISSUER: "http://startupai-zitadel:8080"
        RIG_SERVICE_URL: "http://rig-service:5153"
        API_SERVICE_URL: "http://api-service:5154"
        CHAT_SERVICE_URL: "http://chat-service:5155"
        NOTIFICATION_SERVICE_URL: "http://notification-service:5156"
        NEXT_PUBLIC_API_BASE_URL: "http://api-service:5154"
