# Local environment values for api-service
# GitOps-managed: CI pushes to GHCR, ArgoCD pulls from GHCR

nameOverride: api-service
image:
  repository: ghcr.io/mylesberueda/startup-ai/api-service
  tag: ab22d39285e8b5419e29a26dcbbe48e15cd28801
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-pull-secret
service:
  port: 5154
  targetPort: 5154
# Lower resources for local development
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi
# HTTP health checks at /health (no auth required)
healthCheck:
  enabled: true
  httpPath: /health
  port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1
readinessProbe:
  enabled: true
  httpPath: /health
  port: http
  initialDelaySeconds: 3
  periodSeconds: 3
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1
# No autoscaling locally
autoscaling:
  enabled: false
# Reference external ConfigMap generated from .env file
# Generated by: pnpm nx run api-service:k8s:configmap
envFrom:
  - configMapRef:
      name: api-service-env
# Mount /tmp for read-only root filesystem
volumeMounts:
  - name: tmp
    mountPath: /tmp
volumes:
  - name: tmp
    emptyDir: {}
