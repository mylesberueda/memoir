# Local environment values for chat-service
# GitOps-managed: CI pushes to GHCR, ArgoCD pulls from GHCR

nameOverride: chat-service
image:
  repository: ghcr.io/mylesberueda/startup-ai/chat-service
  tag: ab22d39285e8b5419e29a26dcbbe48e15cd28801
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-pull-secret
service:
  port: 5155
  targetPort: 5155
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi
# HTTP health checks at /health (no auth required)
healthCheck:
  enabled: true
  httpPath: /health
  port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1
readinessProbe:
  enabled: true
  httpPath: /health
  port: http
  initialDelaySeconds: 3
  periodSeconds: 3
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1
autoscaling:
  enabled: false
# Reference external ConfigMap generated from .env file
envFrom:
  - configMapRef:
      name: chat-service-env
volumeMounts:
  - name: tmp
    mountPath: /tmp
volumes:
  - name: tmp
    emptyDir: {}
