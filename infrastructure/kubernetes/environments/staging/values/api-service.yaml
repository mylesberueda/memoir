# Staging environment values for api-service
# Secrets are loaded from a single GCP Secret Manager secret containing all env vars as JSON

nameOverride: api-service
image:
  repository: us-central1-docker.pkg.dev/PROJECT_ID/startup-ai/api-service
  tag: bc5b2ba9b0de9a6d1256fd05dcc0ceaae37ec261 # Updated by ArgoCD Image Updater
  pullPolicy: Always
replicaCount: 2
service:
  port: 5154
  targetPort: 5154
# Workload Identity for GCP Secret Manager access
serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: api-service@PROJECT_ID.iam.gserviceaccount.com
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
healthCheck:
  enabled: true
  httpPath: /health
  port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
readinessProbe:
  enabled: true
  httpPath: /health
  port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
podDisruptionBudget:
  enabled: true
  minAvailable: 1
# Bulk load all env vars from a single GCP Secret Manager secret
# The secret should contain JSON: {"DATABASE_URL": "...", "REDIS_URL": "...", ...}
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  dataFrom:
    - extract:
        key: staging/api-service
volumeMounts:
  - name: tmp
    mountPath: /tmp
volumes:
  - name: tmp
    emptyDir: {}
# Spread across zones
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: api-service
