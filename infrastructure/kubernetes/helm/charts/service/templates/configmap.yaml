{{- if and .Values.enabled (gt (len .Values.configMap.data) 0) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service.configMapName" . }}
  labels:
    {{- include "service.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.configMap.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
