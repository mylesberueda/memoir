# Production environment - HA configuration for GKE

global:
  domain: argocd.example.com

configs:
  params:
    server.insecure: false

server:
  replicas: 3
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 5

  ingress:
    enabled: true
    ingressClassName: gce
    annotations:
      kubernetes.io/ingress.global-static-ip-name: argocd-prod-ip
      networking.gke.io/managed-certificates: argocd-prod-cert
    hosts:
      - argocd.example.com
    tls:
      - hosts:
          - argocd.example.com

controller:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

repoServer:
  replicas: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 5
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

redis:
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

notifications:
  enabled: true
