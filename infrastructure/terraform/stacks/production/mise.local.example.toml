[env]
TF_VAR_gcp_project_id = "production-gcp-project-id"
TF_VAR_domain = "memoir.local"

# ArgoCD
# ------------------------------------------------------------------------------
# github.com/settings/personal-access-tokens -> generate new token
# contents:r, metadata:r
TF_VAR_github_argocd_token = "ghp_xxx"
TF_VAR_argocd_target_revision = "deploy/main"
