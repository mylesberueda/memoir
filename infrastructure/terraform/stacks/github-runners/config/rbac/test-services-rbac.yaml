---
# Role for test-services namespace specific operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: test-services
  name: github-runner-test-services-namespace
  labels:
    app.kubernetes.io/name: github-runner-test-services
    app.kubernetes.io/component: rbac
    app.kubernetes.io/managed-by: github-runners-setup
rules:
# Full permissions within test-services namespace
- apiGroups: [""]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["extensions"]
  resources: ["*"]
  verbs: ["*"]

---
# RoleBinding for test-services namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-runner-test-services-namespace
  namespace: test-services
  labels:
    app.kubernetes.io/name: github-runner-test-services
    app.kubernetes.io/component: rbac
    app.kubernetes.io/managed-by: github-runners-setup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-runner-test-services-namespace
subjects:
- kind: ServiceAccount
  name: arc-runner-set-gha-rs-kube-mode
  namespace: arc-runners
