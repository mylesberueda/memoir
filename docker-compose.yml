name: "memoir"

volumes:
  memoir-postgres: {}
  memoir-qdrant: {}

services:
  # To run all services, use `docker compose --profile dev up -d`
  ### Databases ###
  # You can run these services by themselves with `docker compose --profile dbs up`
  postgres:
    container_name: memoir-postgres
    image: pgvector/pgvector:pg17
    ports:
      - $DB_PORT:5432
    environment:
      - POSTGRES_USER=$DB_USER
      - POSTGRES_PASSWORD=$DB_PASS
      - POSTGRES_DB=$DB_NAME
    restart: unless-stopped
    volumes:
      - memoir-postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    command: postgres -c listen_addresses='*'
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "$DB_NAME", "-U", "$DB_USER"]
      interval: "10s"
      timeout: "30s"
      retries: 5
      start_period: "20s"
    networks:
      - default
      - kind

  redis:
    container_name: memoir-redis
    image: redis:alpine
    ports:
      - $RD_PORT:6379
    deploy:
      resources:
        limits:
          memory: 64M
    command: redis-server --appendonly yes
    networks:
      - default
      - kind

  ollama:
    image: ollama/ollama:latest
    container_name: memoir-ollama
    profiles:
      - "ai"
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_GPU_COUNT=${OLLAMA_GPU_COUNT}
      - OLLAMA_NEW_ENGINE=true
    volumes:
      - ${OLLAMA_STORAGE}:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-0}
              capabilities: [gpu]
    restart: unless-stopped

  qdrant:
    container_name: memoir-qdrant
    image: qdrant/qdrant:latest # Currently @ 1.17
    ports:
      - "$QDRANT_REST_PORT:6333"
      - "$QDRANT_GRPC_PORT:6334"
    volumes:
      - memoir-qdrant:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "10s"
    networks:
      - default
      - kind

networks:
  # Kind cluster network - allows pods to reach Compose services by container name
  # Kind automatically creates this network, or you can pre-create it:
  #   docker network create kind
  # After both are running, pods can reach: memoir-postgres:5432, memoir-redis:6379, etc.
  kind:
    external: true
    name: kind
